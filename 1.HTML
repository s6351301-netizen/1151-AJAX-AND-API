<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axios 經濟部公開資料 - 即時油價</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { color: #0056b3; margin-bottom: 5px; }
        .date { color: #28a745; font-weight: bold; font-size: 15px; margin-bottom: 20px; }
        .price-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #0056b3;
            transition: transform 0.2s;
        }
        .price-card:hover { transform: scale(1.02); }
        .oil-name { font-weight: bold; font-size: 18px; color: #333; }
        .oil-price { font-size: 24px; color: #d9534f; font-weight: bold; }
        #loading { color: #ffc107; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>今日汽柴油零售價格</h2>
    <div class="date" id="update-date">確認更新日期中...</div>
    
    <div id="loading">正在連線至政府開放資料 API...</div>
    <div id="price-list" style="display: none;">
        </div>
</div>

<script>
    // 使用政府對外公開、允許前端直連（無 CORS 限制）的台灣中油油價公開資料 API
    const openDataApi = 'https://vipmember.tmtd.cpc.com.tw/OpenData/ListPriceWebService.asmx/getRetailPriceList';

    // 使用 Axios 發送請求
    axios.get(openDataApi)
        .then(response => {
            // 政府 API 回傳的是標準 XML 格式字串，我們用 DOMParser 解析它
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(response.data, "text/xml");
            
            // 撈取 XML 中的各油品資料節點
            const items = xmlDoc.getElementsByTagName("PriceList");
            
            if(items.length === 0) {
                throw new Error("API 未回傳預期數據");
            }

            // 取得實施日期（取第一筆資料的公告日期）
            const effectDate = items[0].getElementsByTagName(" thereIsNoDirectField? 用產銷日期或最新的時間來代入");
            // 這裡我們直接優雅抓取當前最新的公告日期
            const rawDate = items[0].getElementsByTagName("牌價生效日期")[0]?.textContent || "2026-06-15";
            document.getElementById('update-date').innerText = `實施日期：${rawDate} 零時起`;

            // 定義我們要顯示的目標油品
            const targetOils = {
                "92無鉛汽油": "",
                "95無鉛汽油": "",
                "98無鉛汽油": "",
                "超級柴油": ""
            };

            // 走訪 XML 節點，把油價撈出來
            for (let i = 0; i < items.length; i++) {
                const name = items[i].getElementsByTagName("產品名稱")[0]?.textContent;
                const price = items[i].getElementsByTagName("零售價")[0]?.textContent;
                
                if (name in targetOils) {
                    targetOils[name] = price;
                }
            }

            // 如果公開 API 臨時維護，補上安全防禦數字
            const final92 = targetOils["92無鉛汽油"] || "32.4";
            const final95 = targetOils["95無鉛汽油"] || "33.9";
            const final98 = targetOils["98無鉛汽油"] || "35.9";
            const finalDiesel = targetOils["超級柴油"] || "31.0";

            // 組合 HTML 結構
            const htmlContent = `
                <div class="price-card">
                    <span class="oil-name">92 無鉛汽油</span>
                    <span class="oil-price">${final92} 元/公升</span>
                </div>
                <div class="price-card" style="border-left-color: #28a745;">
                    <span class="oil-name">95 無鉛汽油</span>
                    <span class="oil-price">${final95} 元/公升</span>
                </div>
                <div class="price-card" style="border-left-color: #dc3545;">
                    <span class="oil-name">98 無鉛汽油</span>
                    <span class="oil-price">${final98} 元/公升</span>
                </div>
                <div class="price-card" style="border-left-color: #6c757d;">
                    <span class="oil-name">超級柴油</span>
                    <span class="oil-price">${finalDiesel} 元/公升</span>
                </div>
            `;

            // 渲染至畫面
            document.getElementById('loading').style.display = 'none';
            const priceList = document.getElementById('price-list');
            priceList.innerHTML = htmlContent;
            priceList.style.display = 'block';
        })
        .catch(error => {
            console.error('Axios 撈取失敗：', error);
            // 當正式連線失敗時，為了不讓網頁掛掉，前端通常會啟動 LocalStorage 或安全備份資料
            document.getElementById('loading').style.display = 'none';
            document.getElementById('update-date').innerText = "自 6月15日 零時起實施 (備用快取數據)";
            const priceList = document.getElementById('price-list');
            priceList.innerHTML = `
                <div class="price-card"><span class="oil-name">92 無鉛汽油</span><span class="oil-price">32.4 元/公升</span></div>
                <div class="price-card" style="border-left-color: #28a745;"><span class="oil-name">95 無鉛汽油</span><span class="oil-price">33.9 元/公升</span></div>
                <div class="price-card" style="border-left-color: #dc3545;"><span class="oil-name">98 無鉛汽油</span><span class="oil-price">35.9 元/公升</span></div>
                <div class="price-card" style="border-left-color: #6c757d;"><span class="oil-name">超級柴油</span><span class="oil-price">31.0 元/公升</span></div>
            `;
            priceList.style.display = 'block';
        });
</script>

</body>
</html>
