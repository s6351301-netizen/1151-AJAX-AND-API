<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Fetch</title>
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
        <style>
        li {
    padding: 10px;
    border: 1px solid green;
    margin: 3px 10px;
    border-radius: 20px;
}

li:hover {
    background: lightblue;
    color: red;
}
    </style>
</head>
<body>
    <h1 class="header">Fetch</h1>
    <div class="title"></div>
    <h4>活動列表</h4>
    <ul id="EventList"></ul>
    
</body>
</html>
<script>
    /********************************************************
    * 1.api網址  https://kktix.com/events.json
    * 2.建FETCH請求及實質內容
    * 3.建立回呼函式(call back function)來處理回應時的各項行為
    * 4.建立錯誤處理
    ********************************************************/

    //建立FETCH請求及實質內容
    fetch('https://kktix.com/events.json')
        //建立回呼函式(call back function)來處理回應時的各項行為
        .then(response => response.json())
        .then(data => {
            console.log(data);
            buildEventList(data)
        })
        //建立錯誤處理
        .catch(error => {
            console.error('錯誤:', error);
        });

 function buildEventList(data){
    let title=data.title
        let titleContainer=document.querySelector(".title");
        titleContainer.innerHTML=title;
        let events=data.entry
        let ul=document.querySelector('#EventList');
        let event='';
        for(let i=0;i<events.length/4;i++){
            event=event+`<li>
                           <h3>${events[i].title}</h3>
                         </li>`
        }
        console.log(event)
        ul.innerHTML=event
 }

  </script>
